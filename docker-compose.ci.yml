# CORI Alpha CI stack — postgres, lawful nova, AAIS, AAES, Nexus, dashboard.
version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cori
      POSTGRES_PASSWORD: cori
      POSTGRES_DB: cori
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cori -d cori"]
      interval: 5s
      timeout: 5s
      retries: 12

  lawful_nova:
    build:
      context: .
      dockerfile: nova/Dockerfile
    command: uvicorn nova.api:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  aais:
    build:
      context: .
      dockerfile: deploy/pilot/Dockerfile.aais
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
      AAIS_GENOME_BOOT: warn
      CONTINUITY_STORE_PATH: /app/data/continuity.sqlite3
      LAW_LEDGER_PATH: /app/data/law-ledger.sqlite3
      NOVA_PANEL_STORE_PATH: /app/data/nova_panel_store.sqlite3
      RUNTIME_DATABASE_URL: sqlite:////app/data/runtime_core.db
      NEXUS_EXECUTION_LEDGER_PATH: /app/data/nexus_executions.jsonl
      LAWFUL_NOVA_BASE_URL: http://lawful_nova:8080
      GOVERNED_NOVA_IN_PROCESS: "1"
      GOVERNED_URG_IN_PROCESS: "1"
      GOVERNED_AAES_IN_PROCESS: "1"
      CORI_CI_STUB_URG: "1"
    depends_on:
      postgres:
        condition: service_healthy
      lawful_nova:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  aaes:
    build:
      context: .
      dockerfile: aaes/Dockerfile
    command: uvicorn aaes.api:app --host 0.0.0.0 --port 8101
    ports:
      - "8101:8101"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
    depends_on:
      aais:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8101/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  nexus_dashboard:
    build:
      context: .
      dockerfile: nexus/ops_console/Dockerfile
    command: uvicorn nexus.ops_console.api:app --host 0.0.0.0 --port 4000
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
      NEXUS_EXECUTION_LEDGER_PATH: /app/data/nexus_executions.jsonl
    depends_on:
      aaes:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: src/dashboard/Dockerfile
    command: uvicorn src.dashboard.app:app --host 0.0.0.0 --port 8100
    ports:
      - "8100:8100"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
      CONTINUITY_STORE_PATH: /app/data/continuity.sqlite3
      LAW_LEDGER_PATH: /app/data/law-ledger.sqlite3
      NOVA_PANEL_STORE_PATH: /app/data/nova_panel_store.sqlite3
    depends_on:
      aais:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8100/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

networks:
  default:
    driver: bridge
