# HTTP-mode override for CORI CI — cross-container governed spine proof.
# Usage: docker compose -f docker-compose.ci.yml -f docker-compose.ci-http.yml up -d --force-recreate aais
version: "3.8"

services:
  aais:
    environment:
      GOVERNED_NOVA_IN_PROCESS: "0"
      GOVERNED_URG_IN_PROCESS: "0"
      GOVERNED_AAES_IN_PROCESS: "0"
      CORI_CI_STUB_URG: "0"
      LAWFUL_NOVA_BASE_URL: http://lawful_nova:8080
      AAIS_BASE_URL: http://127.0.0.1:8000
      NEXUS_EXECUTION_LEDGER_PATH: /app/data/nexus_executions.jsonl
