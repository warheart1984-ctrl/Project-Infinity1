openapi: 3.0.3
info:
  title: CORI Governed Mission API
  version: 1.0.0
  description: |
    Constitutional runtime spine for governed operator missions.
    Lawful Nova → URG → AAES → Nexus OS.

servers:
  - url: http://127.0.0.1:8000
    description: Local AAIS workflow shell

paths:
  /governed/mission:
    post:
      summary: Submit a governed mission through the constitutional runtime
      description: |
        Executes the full governed pipeline:
        Lawful Nova → URG → AAES → Nexus OS.
        Persists panels, law ledger entries, and continuity events to SQLite.
      operationId: makeGovernedMission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernedMissionRequest'
      responses:
        '200':
          description: Full constitutional trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernedMissionTrace'
        '400':
          description: Missing or invalid request
        '500':
          description: Spine execution failed

  /api/nexus/executions:
    get:
      summary: List recent Nexus execution events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Nexus execution ledger slice
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      $ref: '#/components/schemas/NexusExecutionEvent'

components:
  schemas:
    GovernedMissionRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: User turn evaluated by Lawful Nova
        operator_id:
          type: string
          description: Steward / operator identifier
        session_id:
          type: string
          description: Optional AAIS session id
        tenant_id:
          type: string
          description: Tenant scope for Nova and URG
        aais_instance_id:
          type: string
          description: URG routing target instance
        steward_identity:
          type: object
          additionalProperties: true
          description: Explicit steward identity snapshot

    GovernedMissionTrace:
      type: object
      properties:
        status:
          type: string
          enum: [ok, partial]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        law_eval:
          $ref: '#/components/schemas/LawEvalArtifact'
        urg_receipt:
          $ref: '#/components/schemas/UrgMissionReceipt'
        aaes_receipt:
          $ref: '#/components/schemas/AaesExecutionReceipt'
        nexus_event:
          $ref: '#/components/schemas/NexusExecutionEvent'
        constitutional_trace:
          type: object
          properties:
            panels:
              type: object
            references:
              type: object
            hashes:
              type: object
            timestamps:
              type: object
            persistence:
              type: object

    LawEvalArtifact:
      type: object
      properties:
        status:
          type: string
        id:
          type: string
        intent:
          type: string
        intent_type:
          type: string
        law_hash:
          type: string
        t5_refs:
          type: object

    UrgMissionReceipt:
      type: object
      properties:
        mission_id:
          type: string
        status:
          type: string
        law_eval_id:
          type: string

    AaesExecutionReceipt:
      type: object
      properties:
        status:
          type: string
          description: Normalized to executed when AAES returns ok
        execution_id:
          type: string
        trace_id:
          type: string
        darz_bridge_hash:
          type: string
        blocked:
          type: boolean

    NexusExecutionEvent:
      type: object
      properties:
        event_type:
          type: string
          example: execution
        event_id:
          type: string
        mission_id:
          type: string
        law_eval_id:
          type: string
        aaes_trace_id:
          type: string
        aaes_status:
          type: string
        steward_id:
          type: string
        recorded_at:
          type: string
          format: date-time
