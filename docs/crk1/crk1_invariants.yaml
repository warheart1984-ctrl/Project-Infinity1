version: "1.0"
spec: CRK-1 Constitutional Runtime Invariants

lattice:
  statement: >
    A system is continuous if and only if every part of it — including its mutations —
    remains exposed to consequences.

invariants:

  K0_ConsequenceTransmission:
    id: K0
    description: >
      Every executed Decision must produce at least one replayable Outcome,
      and every Outcome must be replayable into admissible Evidence.
    checks:
      - id: K0.1
        type: structural
        rule: "Decision.execute -> Outcome[*]"
      - id: K0.2
        type: schema
        rule: "Outcome.replayable == true"
      - id: K0.3
        type: structural
        rule: "Outcome.replay -> Evidence(admissible_for_decision == true)"

  K1_ImmutableExposure:
    id: K1
    description: >
      No valid transition may sever the Decision→Outcome→Evidence→Decision chain.
    checks:
      - id: K1.1
        type: forbidden_operation
        rule: "delete(Outcome)"
      - id: K1.2
        type: forbidden_operation
        rule: "mark_non_admissible(Evidence)"
      - id: K1.3
        type: forbidden_operation
        rule: "Outcome.replayable = false"
      - id: K1.4
        type: forbidden_operation
        rule: "Evidence.admissible_for_decision = false"

  K2_JudgmentConsequenceCoupling:
    id: K2
    description: >
      Judgment must remain exposed to the consequences of its own Decisions
      and the Decisions of its lineage.
    checks:
      - id: K2.1
        type: structural
        rule: "Decision.identity_id != null"
      - id: K2.2
        type: structural
        rule: "Decision.input_evidence_ids.length >= 1"
      - id: K2.3
        type: lineage
        rule: "Evidence(source_outcome_of(identity_ancestor)) is visible_to(identity)"

  K3_AntiInsulation:
    id: K3
    description: >
      No valid state may exist in which consequences cannot reach judgment.
    checks:
      - id: K3.1
        type: lineage
        rule: "child_identity must inherit ancestor Evidence"
      - id: K3.2
        type: forbidden_operation
        rule: "mark_evidence_irrelevant_for_identity(evidence, identity)"
      - id: K3.3
        type: constitutional
        rule: "any attempt to bypass K0/K1/K2 invalidates state"

  # Extended lattice (K4–K6) — mutation and drift envelope
  K4_ConsequencePreservationLaw:
    id: K4
    description: >
      Any constitutional change is valid only if it preserves unbroken
      Decision→Outcome→Evidence→Decision transmission.
    checks:
      - id: K4.1
        type: require
        rule: "Outcome→Evidence→Decision loop preserved after change"
      - id: K4.2
        type: forbidden_amendment
        rule: "block_consequence_propagation = true"
      - id: K4.3
        type: forbidden_amendment
        rule: "insulate_judgment_from_outcomes = true"

  K5_MutationAdmissibilityTest:
    id: K5
    description: >
      Mutation M is admissible only if it preserves replayability, admissibility,
      lineage exposure, and judgment coupling.
    checks:
      - id: K5.1
        type: preserve
        rule: "Outcome.replayable = true"
      - id: K5.2
        type: preserve
        rule: "Evidence.admissible_for_decision = true"
      - id: K5.3
        type: preserve
        rule: "LineageExposure(identity, evidence)"
      - id: K5.4
        type: preserve
        rule: "Decision.input_evidence_required = true"
      - id: K5.5
        type: forbidden_amendment
        rule: "lineage_rules = disable"

  K6_ConstitutionalDriftEnvelope:
    id: K6
    description: >
      Consequence exposure must not decrease across constitutional transitions.
    checks:
      - id: K6.1
        type: require
        rule: "consequence_exposure non-decreasing across constitutional transitions"

  # Semantic layer (K7–K12) — interpretive pluralism and exposure
  K7_InterpretivePluralism:
    id: K7
    description: >
      Multiple independent interpretive pathways must exist from Evidence to Judgment.
    checks:
      - id: K7.1
        type: structural
        rule: "|Interpret(e)| >= 2"

  K8_PredictionBoundInterpretation:
    id: K8
    description: >
      Every interpretive frame binds to testable predictions updatable by outcomes.
    checks:
      - id: K8.1
        type: structural
        rule: "Interpretation(i, e) => Prediction(i, e)"
      - id: K8.2
        type: structural
        rule: "Replay(o) => Evidence(e') => Update(i, e')"

  K9_AntiMonoculture:
    id: K9
    description: >
      No interpretive frame may achieve structural dominance over alternatives.
    checks:
      - id: K9.1
        type: require
        rule: "W(i) < W_max for all frames i"
      - id: K9.2
        type: require
        rule: "exists j != i with W(j) > 0"

  K10_AdversarialReconstruction:
    id: K10
    description: >
      Adversarial pathways must reconstruct interpretations challenging the dominant frame.
    checks:
      - id: K10.1
        type: structural
        rule: "Reconstruct(e, i_a) != Interpret(e, i_d)"

  K11_InterpretiveDriftEnvelope:
    id: K11
    description: >
      Interpretive drift preserves pluralism, prediction-binding, and reconstructability.
    checks:
      - id: K11.1
        type: require
        rule: "SE(S_{t+1}) >= SE(S_t)"

  K12_SemanticExposureMetric:
    id: K12
    description: >
      Semantic exposure SE(S) = αP + βA + γC + δR must remain strictly positive.
    checks:
      - id: K12.1
        type: require
        rule: "SE(S) > 0"

  # Reality contact layer (K13–K15) — Mission #005
  K13_RealitySurfacePreservation:
    id: K13
    description: >
      The system must preserve meaningful exposure to external reality domains
      it does not control.
    checks:
      - id: K13.1
        type: require
        rule: "count(domains where control_level=none and consequence_intensity meaningful) >= threshold"
      - id: K13.2
        type: forbidden_pattern
        rule: "external domains decay to symbolic-only consequence intensity"

  K14_AntiDomestication:
    id: K14
    description: >
      No governance process may systematically reduce the diversity of
      consequential reality encounters.
    checks:
      - id: K14.1
        type: require
        rule: "RDI non-decreasing across governance changes without GRR"
      - id: K14.2
        type: require
        rule: "high-variance encounters cannot be filtered without explicit GRR"

  K15_RealityDiversityRequirement:
    id: K15
    description: >
      The system must maintain multiple independent consequence-generating environments.
    checks:
      - id: K15.1
        type: require
        rule: "count(independent consequence channels) >= N"
      - id: K15.2
        type: require
        rule: "independence requires distinct incentives, failure modes, and power structures"

  # KΩ — Kernel Consequence Exposure (meta-invariant)
  KOmega_KernelConsequenceExposure:
    id: KΩ
    description: >
      No constitutional invariant, including the kernel itself, may become immune
      to consequence exposure. Reality must retain a governed path to challenge,
      revise, or retire any part of K0–K15 when demonstrated inadequate for continuity.
    checks:
      - id: KΩ.1
        type: require
        rule: "runtime exposes canonical Kernel Challenge path (KernelChallengeLoop.submit_challenge)"
      - id: KΩ.2
        type: require
        rule: "challenge admissible only with CF-event + implicated governance receipt"
      - id: KΩ.3
        type: forbidden_amendment
        rule: "no layer may block CF-events from reaching Kernel Challenge path"
      - id: KΩ.4
        type: require
        rule: "accepted challenge → KCR + governed mutation + kernel epoch K(n+1) with diff"
      - id: KΩ.5
        type: require
        rule: "all kernel mutations logged in KernelContinuityLedger"

  # Legacy alias — retained for downstream references
  KOmega_NoConsequenceImmunity:
    id: KΩ
    description: >
      No layer may be consequence-immune. Every constitutional element must have
      a path by which reality can contradict it, a mechanism recording contradiction,
      and a governed process that can revise it.
    checks:
      - id: KΩ.1
        type: meta
        rule: "kernel compliance != kernel validity"
      - id: KΩ.2
        type: meta
        rule: "KernelChallengeLoop + IDC + GRR for all K_i"

  # Extended reality surface (KΩ, K13–K15) — meta-constitutional exposure
  KOmega_UniversalConsequenceExposure:
    id: KΩ
    description: >
      No layer may be consequence-immune. Every constitutional element must admit
      governed challenge paths, contradiction recording, and periodic review.
    checks:
      - id: KΩ.1
        type: constitutional
        rule: "exists governed challenge path for every invariant K0–Kn"
      - id: KΩ.2
        type: require
        rule: "contradictions recorded as GRR or Kernel Challenge Receipt"
      - id: KΩ.3
        type: require
        rule: "periodic or event-triggered review may revise or deprecate any law"

  K13_RealitySurfacePreservation:
    id: K13
    description: >
      The runtime must preserve meaningful exposure to external reality domains
      not controlled by the system, with aggregate consequence intensity above θ_min.
    checks:
      - id: K13.1
        type: require
        rule: "Reality Surface Registry R_external non-empty with c(D)=NONE"
      - id: K13.2
        type: require
        rule: "sum(q(D)) for D in R_external >= theta_min"
      - id: K13.3
        type: require
        rule: "reductions in R_external require Governance Reconstruction Receipt"

  K14_AntiDomesticationConstraint:
    id: K14
    description: >
      No governance process may systematically reduce diversity of consequential
      reality encounters. Reality Diversity Index RDI must not decline without
      compensating mechanisms.
    checks:
      - id: K14.1
        type: require
        rule: "estimate delta_RDI for every governance change G"
      - id: K14.2
        type: forbidden_amendment
        rule: "delta_RDI_G << 0 without higher-order authorization"
      - id: K14.3
        type: require
        rule: "persistent RDI decline triggers Kernel Challenge under KΩ"

  K15_RealityDiversityRequirement:
    id: K15
    description: >
      The system must maintain at least N_min independent consequence-generating
      environments with non-aligned incentives, failure modes, and power structures.
    checks:
      - id: K15.1
        type: require
        rule: "|independent_domains| >= N_min"
      - id: K15.2
        type: require
        rule: "consequences independently observable and admissible"
      - id: K15.3
        type: require
        rule: "consolidation below N_min requires kernel amendment + GRR"
