<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1180" viewBox="0 0 1400 1180">

  <style>
    .box { fill:#f7f7f7; stroke:#333; stroke-width:2; rx:10; ry:10; }
    .layer { fill:#eaeaea; stroke:#333; stroke-width:2; rx:20; ry:20; }
    .label { font-family:Verdana,sans-serif; font-size:14px; fill:#000; }
    .sublabel { font-family:Verdana,sans-serif; font-size:11px; fill:#444; }
    .title { font-family:Verdana,sans-serif; font-size:18px; fill:#000; font-weight:bold; }
    .arrow { stroke:#333; stroke-width:2; marker-end:url(#arrowhead); }
    .dashed { stroke:#555; stroke-width:2; stroke-dasharray:8 5; marker-end:url(#arrowhead-dashed); }
    .drift { stroke:#1a5276; stroke-width:2; stroke-dasharray:6 4; marker-end:url(#arrowhead-blue); }
    .contract { fill:#fff; stroke:#555; stroke-width:2; rx:8; ry:8; }
    .metric { fill:#d6eaf8; stroke:#1a5276; stroke-width:2; rx:8; ry:8; }
    .engine { fill:#fef9e7; stroke:#7d6608; stroke-width:1.5; rx:6; ry:6; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-dashed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a5276"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="40" class="title" text-anchor="middle">
    CRK-1 Unified Runtime Diagram — Objects, Contracts, and Continuity Layers
  </text>
  <text x="700" y="62" class="sublabel" text-anchor="middle">
    Consequence Transmission Lattice (K0-K12) — Codex front matter
  </text>

  <!-- =============================== -->
  <!-- Transmission Layer (K0-K2)      -->
  <!-- =============================== -->
  <rect x="50" y="80" width="1300" height="260" class="layer"/>
  <text x="700" y="110" class="title" text-anchor="middle">Transmission Layer (K0-K2)</text>
  <text x="700" y="138" class="label" text-anchor="middle">
    K0 Consequence Transmission  |  K1 Immutable Exposure  |  K2 Judgment-Consequence Coupling
  </text>

  <!-- Objects -->
  <rect x="120" y="170" width="200" height="80" class="box"/>
  <text x="220" y="205" class="label" text-anchor="middle">Identity</text>
  <text x="220" y="225" class="sublabel" text-anchor="middle">lineage root</text>

  <rect x="420" y="170" width="200" height="80" class="box"/>
  <text x="520" y="205" class="label" text-anchor="middle">Decision</text>
  <text x="520" y="225" class="sublabel" text-anchor="middle">requires evidence</text>

  <rect x="720" y="170" width="200" height="80" class="box"/>
  <text x="820" y="205" class="label" text-anchor="middle">Outcome</text>
  <text x="820" y="225" class="sublabel" text-anchor="middle">replayable</text>

  <rect x="1020" y="170" width="200" height="80" class="box"/>
  <text x="1120" y="205" class="label" text-anchor="middle">Evidence</text>
  <text x="1120" y="225" class="sublabel" text-anchor="middle">admissible</text>

  <!-- Transmission arrows -->
  <line x1="320" y1="210" x2="420" y2="210" class="arrow"/>
  <text x="370" y="200" class="sublabel" text-anchor="middle">authorize</text>

  <line x1="620" y1="210" x2="720" y2="210" class="arrow"/>
  <text x="670" y="200" class="sublabel" text-anchor="middle">execute</text>

  <line x1="920" y1="210" x2="1020" y2="210" class="arrow"/>
  <text x="970" y="200" class="sublabel" text-anchor="middle">replay</text>

  <!-- Consequence loop back to Decision -->
  <line x1="1120" y1="250" x2="1120" y2="300" class="arrow"/>
  <line x1="1120" y1="300" x2="520" y2="300" class="arrow"/>
  <line x1="520" y1="300" x2="520" y2="250" class="arrow"/>
  <text x="820" y="318" class="sublabel" text-anchor="middle">K0: Decision &#8594; Outcome &#8594; Evidence &#8594; Decision</text>

  <!-- Evidence down to Assimilation -->
  <line x1="1120" y1="250" x2="1120" y2="680" class="dashed"/>
  <text x="1145" y="480" class="sublabel" transform="rotate(90 1145 480)">raw evidence</text>

  <!-- =============================== -->
  <!-- Preservation Layer (K3-K6)     -->
  <!-- =============================== -->
  <rect x="50" y="380" width="1300" height="280" class="layer"/>
  <text x="700" y="410" class="title" text-anchor="middle">Preservation Layer (K3-K6)</text>
  <text x="700" y="438" class="label" text-anchor="middle">
    K3 Anti-Insulation  |  K4 Consequence Preservation  |  K5 Mutation Admissibility  |  K6 Drift Envelope CE(S)
  </text>

  <!-- Four contracts -->
  <rect x="90" y="470" width="240" height="80" class="contract"/>
  <text x="210" y="505" class="label" text-anchor="middle">Evidence Contract</text>
  <text x="210" y="525" class="sublabel" text-anchor="middle">admissibility gate</text>

  <rect x="370" y="470" width="240" height="80" class="contract"/>
  <text x="490" y="505" class="label" text-anchor="middle">Governance Contract</text>
  <text x="490" y="525" class="sublabel" text-anchor="middle">amendment gate</text>

  <rect x="650" y="470" width="240" height="80" class="contract"/>
  <text x="770" y="505" class="label" text-anchor="middle">Resource Contract</text>
  <text x="770" y="525" class="sublabel" text-anchor="middle">capacity gate</text>

  <rect x="930" y="470" width="240" height="80" class="contract"/>
  <text x="1050" y="505" class="label" text-anchor="middle">Runtime Contract</text>
  <text x="1050" y="525" class="sublabel" text-anchor="middle">transition gate</text>

  <!-- Constitutional runtime wrapper -->
  <rect x="300" y="575" width="800" height="55" class="box"/>
  <text x="700" y="608" class="label" text-anchor="middle">
    ConstitutionalRuntime + CRK1Runtime facade  |  consequence_lattice  |  governance_engine  |  integrity_monitor
  </text>

  <!-- CE(S) drift envelope -->
  <rect x="1210" y="460" width="120" height="90" class="metric"/>
  <text x="1270" y="495" class="label" text-anchor="middle">CE(S)</text>
  <text x="1270" y="515" class="sublabel" text-anchor="middle">K6</text>
  <text x="1270" y="535" class="sublabel" text-anchor="middle">CE&#8329;&#8331;&#8321; &#8805; CE&#8329;</text>

  <line x1="1270" y1="460" x2="1270" y2="340" class="drift"/>
  <text x="1288" y="400" class="sublabel">drift</text>

  <!-- Contracts shield transmission -->
  <line x1="210" y1="470" x2="520" y2="340" class="dashed"/>
  <line x1="490" y1="470" x2="520" y2="340" class="dashed"/>
  <line x1="770" y1="470" x2="820" y2="340" class="dashed"/>
  <line x1="1050" y1="470" x2="820" y2="340" class="dashed"/>

  <!-- =============================== -->
  <!-- Assimilation Layer (K7-K12)    -->
  <!-- =============================== -->
  <rect x="50" y="700" width="1300" height="400" class="layer"/>
  <text x="700" y="730" class="title" text-anchor="middle">Assimilation Layer (K7-K12)</text>
  <text x="700" y="758" class="label" text-anchor="middle">
    K7 Pluralism  |  K8 Prediction Binding  |  K9 Anti-Monoculture  |  K10 Adversarial Reconstruction  |  K11-K12 SE(S)
  </text>

  <!-- Semantic objects -->
  <rect x="160" y="810" width="260" height="80" class="box"/>
  <text x="290" y="845" class="label" text-anchor="middle">InterpretationObject</text>
  <text x="290" y="865" class="sublabel" text-anchor="middle">plural frames + lineage</text>

  <rect x="530" y="810" width="260" height="80" class="box"/>
  <text x="660" y="845" class="label" text-anchor="middle">PredictionObject</text>
  <text x="660" y="865" class="sublabel" text-anchor="middle">K8 falsifiable claims</text>

  <rect x="900" y="810" width="260" height="80" class="box"/>
  <text x="1030" y="845" class="label" text-anchor="middle">ReconstructionObject</text>
  <text x="1030" y="865" class="sublabel" text-anchor="middle">K10 adversarial views</text>

  <!-- Semantic loop arrows -->
  <line x1="420" y1="850" x2="530" y2="850" class="arrow"/>
  <line x1="790" y1="850" x2="900" y2="850" class="arrow"/>
  <text x="660" y="838" class="sublabel" text-anchor="middle">K8: interpret &#8594; predict &#8594; reconstruct</text>

  <!-- Evidence feeds interpretation -->
  <line x1="1120" y1="680" x2="290" y2="810" class="dashed"/>

  <!-- Semantic feedback to Decision -->
  <line x1="660" y1="810" x2="660" y2="300" class="arrow"/>
  <text x="678" y="560" class="sublabel">semantic</text>
  <text x="678" y="576" class="sublabel">coupling</text>

  <!-- Support engines -->
  <rect x="160" y="930" width="220" height="55" class="engine"/>
  <text x="270" y="962" class="sublabel" text-anchor="middle">InterpretiveLineageTree</text>

  <rect x="420" y="930" width="220" height="55" class="engine"/>
  <text x="530" y="962" class="sublabel" text-anchor="middle">SemanticReplayEngine</text>

  <rect x="680" y="930" width="220" height="55" class="engine"/>
  <text x="790" y="962" class="sublabel" text-anchor="middle">SemanticDriftAuditor</text>

  <rect x="940" y="930" width="220" height="55" class="engine"/>
  <text x="1050" y="962" class="sublabel" text-anchor="middle">SemanticExposureMonitor</text>

  <!-- SE(S) drift envelope -->
  <rect x="1210" y="820" width="120" height="90" class="metric"/>
  <text x="1270" y="855" class="label" text-anchor="middle">SE(S)</text>
  <text x="1270" y="875" class="sublabel" text-anchor="middle">K11-K12</text>
  <text x="1270" y="895" class="sublabel" text-anchor="middle">SE&#8329;&#8331;&#8321; &#8805; SE&#8329;</text>

  <line x1="1050" y1="960" x2="1210" y2="890" class="drift"/>
  <line x1="1270" y1="820" x2="1270" y2="760" class="drift"/>
  <text x="1288" y="790" class="sublabel">drift</text>

  <!-- Semantic ledger label -->
  <rect x="300" y="1020" width="800" height="50" class="box"/>
  <text x="700" y="1052" class="label" text-anchor="middle">
    Semantic Ledger  |  semantic_layer  |  founder-independent replay (Evidence + frames + predictions + reconstructions)
  </text>

  <!-- Footer legend -->
  <text x="700" y="1145" class="sublabel" text-anchor="middle">
    Immutable exposure, not immutable structure — mutate freely; natural selection (K5/K9) and drift envelopes (K6/K11) cannot be disabled
  </text>

</svg>
