<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180">
  <style>
    .layer { fill:#eaeaea; stroke:#333; stroke-width:1; }
    .label { font-family:Verdana; font-size:10px; fill:#000; }
    .title { font-family:Verdana; font-size:12px; fill:#000; font-weight:bold; }
    .arrow { stroke:#333; stroke-width:1.5; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4"
            refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#333"/>
    </marker>
  </defs>

  <text x="260" y="18" class="title" text-anchor="middle">CRK-1 Kernel (K0K12)</text>

  <rect x="20" y="30" width="480" height="40" rx="8" ry="8" class="layer"/>
  <text x="260" y="55" class="label" text-anchor="middle">
    Transmission: K0K2
  </text>

  <rect x="20" y="75" width="480" height="40" rx="8" ry="8" class="layer"/>
  <text x="260" y="100" class="label" text-anchor="middle">
    Preservation: K3K6
  </text>

  <rect x="20" y="120" width="480" height="40" rx="8" ry="8" class="layer"/>
  <text x="260" y="145" class="label" text-anchor="middle">
    Assimilation: K7K12
  </text>

  <line x1="260" y1="70" x2="260" y2="75" class="arrow"/>
  <line x1="260" y1="115" x2="260" y2="120" class="arrow"/>
</svg>
