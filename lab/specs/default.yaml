spec_version: lab.lab_project_spec.v1
project_id: nova-ai-factory
intent_summary: Lab bench for project-infi governed code experiments.
source_repo: "."
risk_level: low
require_session_summary: false
prohibitions:
  forbidden_commands:
    - "rm -rf"
    - "git clean -fdx"
    - "curl"
    - "wget"
  network_allowed: false
  high_impact_patterns:
    - "**/migrations/**"
    - "ai_factory/ledger.py"
  read_only_paths:
    - "ai_factory/ledger.py"
    - "META_ARCHITECT_LAWBOOK.md"
instruments:
  - name: read_file
    kind: filesystem_read
  - name: write_file
    kind: filesystem_write
  - name: list_dir
    kind: filesystem_list
  - name: grep
    kind: grep
  - name: run_pytest
    command: ["python", "-m", "pytest"]
    max_runtime_s: 120
    allowed_paths: ["tests/", "src/", "ai_factory/", "lab/"]
  - name: run_make
    command: ["make"]
    max_runtime_s: 180
    allowed_paths: ["Makefile"]
  - name: forge_patch_plan
    kind: forge_bridge
  - name: create_patch_review
    kind: forge_bridge
