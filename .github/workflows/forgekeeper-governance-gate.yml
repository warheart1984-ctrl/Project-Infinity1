name: Forgekeeper Governance Gate

on:
  pull_request:
    paths:
      - "forge/**"
      - "tests/test_forgekeeper.py"
      - "scripts/forgekeeper/**"
      - ".github/scripts/check-forgekeeper-governance.py"
      - ".github/workflows/forgekeeper-governance-gate.yml"
  push:
    branches: [main]
    paths:
      - "forge/**"
      - "tests/test_forgekeeper.py"
      - "scripts/forgekeeper/**"
      - ".github/scripts/check-forgekeeper-governance.py"
      - ".github/workflows/forgekeeper-governance-gate.yml"

permissions:
  contents: read

jobs:
  forgekeeper-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Forgekeeper read-only governance gate
        run: |
          python3 .github/scripts/check-forgekeeper-governance.py --repo-root .
