name: Nova Intent Agency Gate

on:
  pull_request:
    paths:
      - "src/cog_runtime/intent*.py"
      - "src/cog_runtime/deliberation.py"
      - "src/cog_runtime/planning.py"
      - "src/cog_runtime/nova.py"
      - "src/cog_runtime/narrative.py"
      - "tests/test_intent*.py"
      - ".github/scripts/check-nova-intent-agency.py"
      - "docs/proof/cognitive_runtime/INTENT_AGENCY_V1_PROOF_BUNDLE.md"
  push:
    branches:
      - main
    paths:
      - "src/cog_runtime/intent*.py"
      - "src/cog_runtime/deliberation.py"
      - "src/cog_runtime/planning.py"
      - "tests/test_intent*.py"
      - ".github/scripts/check-nova-intent-agency.py"

jobs:
  intent-agency-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: pip install -e ".[dev]"
      - name: Intent agency proof gate
        run: python .github/scripts/check-nova-intent-agency.py
