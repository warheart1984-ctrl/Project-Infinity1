name: CoGOS CI Public

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      cogos_tag:
        description: Override CoGOS tag
        required: false
        default: ""
      forge_profile:
        description: Optional Forge profile id for contract checks
        required: false
        default: ""
      governance_ledger_mode:
        description: Governance ledger enforcement mode (warn or fail)
        type: choice
        options:
          - warn
          - fail
        required: false
        default: "fail"

permissions:
  contents: read

concurrency:
  group: cogos-ci-public-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    # Run on PRs, and on protected main for pushes/manual dispatch.
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.ref_protected == true)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COGOS_TAG: ${{ github.event.inputs.cogos_tag || format('ci-{0}', github.run_number) }}
      COGOS_FORGE_PROFILE: ${{ github.event.inputs.forge_profile || '' }}
      GOVERNANCE_LEDGER_MODE: ${{ github.event.inputs.governance_ledger_mode || 'fail' }}
      INSTALLER_STATE_DIR: ${{ runner.temp }}/cogos-installer-state-public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Governance contract preflight
        run: |
          python3 .github/scripts/validate-governance-ledger.py --mode "$GOVERNANCE_LEDGER_MODE" --summary-only

      - name: Forge profile dry-run contract checks
        env:
          COGOS_PROFILE_PRECEDENCE_POLICY: wolf-cog-os/profiles/forge/precedence-policy.md
        run: |
          mkdir -p ci-artifacts
          ACTIVE_FORGE_PROFILE="${COGOS_FORGE_PROFILE:-forge-selfhosted}"
          bash wolf-cog-os/scripts/lib/profile-loader.sh "$ACTIVE_FORGE_PROFILE" > ci-artifacts/profile-resolution.json
          python3 wolf-cog-os/scripts/validate-profile.py --profile "$ACTIVE_FORGE_PROFILE" --mode warn --output ci-artifacts/profile-validation.json
          python3 wolf-cog-os/scripts/emit-profile-attestation.py --profile "$ACTIVE_FORGE_PROFILE" --validation ci-artifacts/profile-validation.json --resolution ci-artifacts/profile-resolution.json --output ci-artifacts/profile-attestation.json --dry-run

      - name: Normalize CI metadata
        id: meta
        run: |
          SANITIZED_TAG="$(bash .github/scripts/sanitize-tag.sh "$COGOS_TAG")"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-8)"
          echo "sanitized_tag=$SANITIZED_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=cogos-public-${SANITIZED_TAG}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3

      - name: Shell syntax sanity
        run: |
          bash -n wolf-cog-os/scripts/cogos-installer.sh
          bash -n wolf-cog-os/scripts/lib/installer/common.sh
          bash -n wolf-cog-os/scripts/build-forge-installer.sh
          bash -n wolf-cog-os/scripts/lib/stage-forge-layout.sh
          bash wolf-cog-os/scripts/test/test-forge-grub.sh
          bash wolf-cog-os/scripts/test/forge-iso-smoke.sh
          bash wolf-cog-os/scripts/test/promotion-dry-run.sh --skip-verify
          make forge-platform-gate

      - name: Installer smoke
        run: |
          make installer-smoke INSTALLER_ARGS="--state-dir $INSTALLER_STATE_DIR"

      - name: Collect installer artifacts
        if: always()
        run: |
          mkdir -p ci-artifacts
          cp -f "$INSTALLER_STATE_DIR"/install-*.log ci-artifacts/ 2>/dev/null || true
          cp -f "$INSTALLER_STATE_DIR/events.log" ci-artifacts/events.log 2>/dev/null || true
          cp -f "$INSTALLER_STATE_DIR/state.json" ci-artifacts/state.json 2>/dev/null || true
          ls -la ci-artifacts || true

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_prefix }}-installer-state
          path: ci-artifacts/
          retention-days: 14
          if-no-files-found: warn
