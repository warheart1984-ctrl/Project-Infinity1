name: Omega Survivability

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  omega:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Run Omega CLI
        run: |
          python -m nova.omega.cli > omega_result.json

      - name: Enforce Ω-threshold
        run: |
          python - << 'EOF'
          import json
          import sys

          with open("omega_result.json") as f:
              data = json.load(f)
          omega = data.get("omega_score", 0.0)
          threshold = data.get("threshold", 0.95)
          print(f"Ω-score: {omega} (threshold {threshold})")
          if omega < threshold:
              print("Omega survivability below threshold — failing build.")
              sys.exit(1)
          EOF

      - name: Run Nova law kernel tests
        run: |
          pytest tests/test_pit_band_activation.py \
            tests/test_nova_law_kernel_v1.py \
            tests/test_t5_law_invariants.py \
            tests/test_pit_lineage_replay.py \
            tests/test_evolution_curves.py \
            tests/test_domain_ladders.py \
            tests/test_omega_pit_harness.py \
            tests/test_nova_stack_integration.py \
            -q
