name: Lab Console Governance Gate

on:
  push:
    paths:
      - "lab/**"
      - "tests/test_lab.py"
      - "tests/test_lab_worktree.py"
      - ".github/scripts/check-lab-governance.py"
      - ".github/workflows/lab-governance-gate.yml"
  pull_request:
    paths:
      - "lab/**"
      - "tests/test_lab.py"
      - "tests/test_lab_worktree.py"
      - ".github/scripts/check-lab-governance.py"
      - ".github/workflows/lab-governance-gate.yml"

jobs:
  lab-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Initialize fixture git repo
        run: |
          cd lab/fixtures/sample-repo
          git init
          git config user.email "lab-gate@ci"
          git config user.name "Lab Gate"
          git add .
          git commit -m "fixture init"

      - name: Run lab governance gate
        run: python .github/scripts/check-lab-governance.py --repo-root .
