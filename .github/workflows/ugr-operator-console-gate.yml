name: UGR Operator Console Gate

on:
  pull_request:
    paths:
      - "src/ugr/operator_console/**"
      - "frontend/src/pages/OperatorConsole.jsx"
      - "frontend/src/pages/OperatorConsole.css"
      - "frontend/src/components/operator/**"
      - "tests/test_ugr_operator_console.py"
      - "wolf-cog-os/scripts/validate-ugr-operator-console-manifest.py"
      - "docs/contracts/UGR_OPERATOR_CONSOLE_CONTRACT.md"
      - "docs/proof/ugr/UGR_OPERATOR_CONSOLE_PROOF.md"
      - ".github/workflows/ugr-operator-console-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/ugr/operator_console/**"
      - "frontend/src/pages/OperatorConsole.jsx"
      - "frontend/src/pages/OperatorConsole.css"
      - "frontend/src/components/operator/**"
      - "tests/test_ugr_operator_console.py"
      - "wolf-cog-os/scripts/validate-ugr-operator-console-manifest.py"
      - "docs/contracts/UGR_OPERATOR_CONSOLE_CONTRACT.md"
      - "docs/proof/ugr/UGR_OPERATOR_CONSOLE_PROOF.md"
      - ".github/workflows/ugr-operator-console-gate.yml"

permissions:
  contents: read

jobs:
  operator-console:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: UGR operator console gate
        shell: bash
        run: |
          python wolf-cog-os/scripts/validate-ugr-operator-console-manifest.py --mode fail
          python -m pytest tests/test_ugr_operator_console.py -q
