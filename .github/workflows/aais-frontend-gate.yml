name: AAIS Frontend Gate

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/aais-frontend-gate.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/aais-frontend-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:ci

      - name: Build frontend bundle
        env:
          VITE_APP_BASE: /app
          VITE_ROUTER_BASENAME: /app
        run: npm run build
