name: CoGOS Stable Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (example: v1.0.0)
        required: true
      source_run_id:
        description: RC workflow run ID to promote artifacts from
        required: false
        default: ""
      expected_profile_id:
        description: Optional expected Forge profile id for source identity checks (example: forge-selfhosted)
        required: false
        default: ""
      governance_ledger_mode:
        description: Governance ledger enforcement mode (warn or fail)
        type: choice
        options:
          - warn
          - fail
        required: false
        default: "fail"
      rc_tag:
        description: Optional RC tag for release notes range
        required: false
        default: ""
      dry_run:
        description: Dry run only
        required: false
        default: "true"

permissions:
  contents: write
  actions: read

concurrency:
  group: cogos-release-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: stable-release
    env:
      MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY }}
      GOVERNANCE_LEDGER_MODE: ${{ github.event.inputs.governance_ledger_mode || 'fail' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Governance contract preflight
        run: |
          python3 .github/scripts/validate-governance-ledger.py --mode "$GOVERNANCE_LEDGER_MODE" --summary-only

      - name: Validate inputs
        run: |
          if [[ -z "${{ github.event.inputs.source_run_id }}" ]]; then
            echo "source_run_id is required for promotion." >&2
            exit 2
          fi

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign python3

      - name: Download source artifacts from RC run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.source_run_id }}
          path: promoted-artifacts
          merge-multiple: true
          github-token: ${{ github.token }}

      - name: Verify required promotable artifacts
        run: |
          ls -la promoted-artifacts
          test -f promoted-artifacts/state.json
          test -f promoted-artifacts/artifact-manifest.json
          test -f promoted-artifacts/build-metadata.json
          ls promoted-artifacts/*.iso >/dev/null 2>&1
          ls promoted-artifacts/*.iso.sha256 >/dev/null 2>&1
          ls promoted-artifacts/*.minisig >/dev/null 2>&1
          if [[ -n "${{ github.event.inputs.expected_profile_id }}" ]]; then
            test -f promoted-artifacts/profile-attestation.json
            test -f promoted-artifacts/profile-validation.json
            test -f promoted-artifacts/forge-build-state.json
          fi

      - name: Validate promotion source identity
        run: |
          REQUIRED_SCENARIOS_ARG=""
          if [[ -n "${{ github.event.inputs.expected_profile_id }}" ]]; then
            REQUIRED_SCENARIOS_ARG='--required-scenarios 1,3,4,6'
          fi
          python3 .github/scripts/validate-promotion-source.py \
            --artifacts-dir "promoted-artifacts" \
            --source-run-id "${{ github.event.inputs.source_run_id }}" \
            --expected-profile-id "${{ github.event.inputs.expected_profile_id }}" \
            ${REQUIRED_SCENARIOS_ARG} \
            --output "promoted-artifacts/promotion-source-validation.json"

      - name: Verify signatures and checksums
        run: |
          make verify-artifacts ARTIFACT_DIR="promoted-artifacts"

      - name: Emit promotion dry-run report
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          REQUIRED_SCENARIOS="1,3,4,6"
          if [[ -z "${{ github.event.inputs.expected_profile_id }}" ]]; then
            REQUIRED_SCENARIOS=""
          fi
          python3 .github/scripts/emit-promotion-dry-run-report.py \
            --artifacts-dir "promoted-artifacts" \
            --source-run-id "${{ github.event.inputs.source_run_id }}" \
            --expected-profile-id "${{ github.event.inputs.expected_profile_id }}" \
            --required-scenarios "$REQUIRED_SCENARIOS" \
            --promotion-validation "promoted-artifacts/promotion-source-validation.json" \
            --output "promoted-artifacts/promotion-dry-run-report.json"

      - name: Resolve previous stable tag
        id: prev
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate stable release notes
        run: |
          python3 .github/scripts/generate-release-notes.py \
            --target-tag "${{ github.event.inputs.release_tag }}" \
            --previous-tag "${{ github.event.inputs.rc_tag || steps.prev.outputs.previous_tag }}" \
            --metadata-dir "promoted-artifacts" \
            --output "promoted-artifacts/release-notes.md"

      - name: Build release index entry
        run: |
          python3 .github/scripts/update-build-index.py \
            --index "release/index.json" \
            --stable "release/stable.json" \
            --latest "release/latest-successful.json" \
            --entry-json "promoted-artifacts/build-metadata.json" \
            --channel "stable"

      - name: Show dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run mode enabled. Skipping stable release publish."
          echo "release_tag=${{ github.event.inputs.release_tag }}"
          echo "source_run_id=${{ github.event.inputs.source_run_id }}"
          echo "expected_profile_id=${{ github.event.inputs.expected_profile_id }}"
          if [[ -f promoted-artifacts/promotion-dry-run-report.json ]]; then
            python3 - <<'PY'
import json
from pathlib import Path
report = json.loads(Path("promoted-artifacts/promotion-dry-run-report.json").read_text(encoding="utf-8"))
print(f"promotion_dry_run_status={report.get('status')}")
for note in report.get("notes", []):
    print(f"note={note}")
PY
          fi
          ls -la promoted-artifacts

      - name: Upload promotion dry-run artifacts
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: promotion-dry-run-${{ github.event.inputs.release_tag }}
          path: |
            promoted-artifacts/promotion-source-validation.json
            promoted-artifacts/promotion-dry-run-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Publish stable GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          prerelease: false
          draft: false
          body_path: promoted-artifacts/release-notes.md
          files: |
            promoted-artifacts/*.iso
            promoted-artifacts/*.iso.sha256
            promoted-artifacts/*.minisig
            promoted-artifacts/artifact-manifest.json
            promoted-artifacts/state.json
            promoted-artifacts/release-notes.md
            release/index.json
            release/stable.json
            release/latest-successful.json

      - name: Commit updated release index
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/index.json release/stable.json release/latest-successful.json
          if git diff --cached --quiet; then
            echo "No release index changes to commit."
            exit 0
          fi
          git commit -m "release: update stable build index for ${{ github.event.inputs.release_tag }}"
          git push
