name: AI Factory Governance Gate

# Paused: automatic runs were failing and spamming notifications.
# Re-enable pull_request/push paths below when the gate is green again.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-factory-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run AI Factory governance gate
        run: python3 .github/scripts/check-ai-factory-governance.py
