name: AI Mechanic Governance Gate

on:
  pull_request:
    paths:
      - "mechanic/**"
      - "tests/test_mechanic.py"
      - ".github/scripts/check-mechanic-governance.py"
      - "docs/subsystems/mechanic/**"
      - "docs/proof/mechanic/**"
  push:
    branches: [main, master]
    paths:
      - "mechanic/**"
      - "tests/test_mechanic.py"
      - ".github/scripts/check-mechanic-governance.py"

jobs:
  mechanic-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: AI Mechanic governance gate
        run: python .github/scripts/check-mechanic-governance.py
