name: stage19-inter-org-proof

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

jobs:
  proof-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inter-org proof cycle (offline-safe)
        run: |
          python tools/governance/run_inter_org_proof_cycle.py --witness-bundle out/
      - name: Upload proof cycle artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage19-proof-cycle
          path: |
            docs/audit/STAGE19_PROOF_CYCLE_*.md
            ci-artifacts/
