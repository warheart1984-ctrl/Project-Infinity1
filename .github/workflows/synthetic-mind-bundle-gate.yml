name: Synthetic Mind Bundle Gate

on:
  pull_request:
    paths:
      - "scripts/cogos/build_synthetic_mind_bundle.py"
      - "src/cog_runtime/**"
      - "schemas/synthetic_mind_bundle.v1.json"
      - "tests/test_synthetic_mind_*.py"
      - "tests/test_spark_pipeline.py"
      - "tests/test_coherence_projection.py"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - "scripts/cogos/build_synthetic_mind_bundle.py"
      - "src/cog_runtime/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synthetic-mind-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Synthetic mind gate
        run: make synthetic-mind-gate REPO_HYGIENE_MODE=fail
