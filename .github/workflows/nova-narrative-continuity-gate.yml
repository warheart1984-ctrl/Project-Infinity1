name: Nova Narrative Continuity Gate

on:
  pull_request:
    paths:
      - "src/cog_runtime/narrative*.py"
      - "src/cog_runtime/nova.py"
      - "src/cogos_runtime_bridge.py"
      - "tests/test_narrative*.py"
      - "docs/proof/cognitive_runtime/NARRATIVE_V1_PROOF_BUNDLE.md"
      - ".github/scripts/check-nova-narrative-continuity.py"
      - ".github/workflows/nova-narrative-continuity-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/cog_runtime/narrative*.py"
      - "src/cog_runtime/nova.py"
      - "src/cogos_runtime_bridge.py"
      - "tests/test_narrative*.py"
      - "docs/proof/cognitive_runtime/NARRATIVE_V1_PROOF_BUNDLE.md"
      - ".github/scripts/check-nova-narrative-continuity.py"
      - ".github/workflows/nova-narrative-continuity-gate.yml"

permissions:
  contents: read

jobs:
  narrative-continuity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nova Narrative continuity proof gate
        run: python3 .github/scripts/check-nova-narrative-continuity.py
