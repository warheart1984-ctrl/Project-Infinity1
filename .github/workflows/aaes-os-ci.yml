name: aaes-os-ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: aaes-os-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm build

      - name: LIRL vertical slice
        run: corepack pnpm --filter @aaes-os/lirl test

      - name: Test
        run: corepack pnpm test

      - name: Lint
        run: corepack pnpm lint

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aaes-os-build
          path: |
            packages/**/dist
            services/**/dist
