name: Nova Cortex Governance Gate

on:
  pull_request:
    paths:
      - "src/cog_runtime/**"
      - "src/speaking_runtime/**"
      - "src/jarvis_reasoning_protocol.py"
      - "src/cogos_runtime_bridge.py"
      - "docs/runtime/NOVA_CORTEX.md"
      - "docs/runtime/cognitive_runtime_family.v1.json"
      - ".github/scripts/check-nova-cortex-governance.py"
      - ".github/workflows/nova-cortex-governance-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/cog_runtime/**"
      - "src/speaking_runtime/**"
      - "src/jarvis_reasoning_protocol.py"
      - "src/cogos_runtime_bridge.py"
      - "docs/runtime/NOVA_CORTEX.md"
      - "docs/runtime/cognitive_runtime_family.v1.json"
      - ".github/scripts/check-nova-cortex-governance.py"
      - ".github/workflows/nova-cortex-governance-gate.yml"

permissions:
  contents: read

jobs:
  nova-cortex-capability-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate lobe capability matrix and runtime specs
        run: python3 .github/scripts/check-nova-cortex-governance.py

      - name: Run capability governance tests
        run: python3 -m pytest tests/test_capability_governance.py -q
