name: Agent Safety Doctrine Gate

on:
  pull_request:
    paths:
      - "META_ARCHITECT_LAWBOOK.md"
      - "REPO_PROOF_LAW.md"
      - "HUMAN_AI_CO_COLLABORATION_CHARTER.md"
      - "governance/agent_change_manifests/**"
      - "templates/AGENT_SAFETY_DOCTRINE_MANIFEST_TEMPLATE.json"
      - ".github/scripts/validate-agent-safety-doctrine.py"
      - ".github/workflows/agent-safety-doctrine-gate.yml"
      - "tests/test_agent_safety_doctrine.py"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - "META_ARCHITECT_LAWBOOK.md"
      - "REPO_PROOF_LAW.md"
      - "HUMAN_AI_CO_COLLABORATION_CHARTER.md"
      - "governance/agent_change_manifests/**"
      - "templates/AGENT_SAFETY_DOCTRINE_MANIFEST_TEMPLATE.json"
      - ".github/scripts/validate-agent-safety-doctrine.py"
      - ".github/workflows/agent-safety-doctrine-gate.yml"
      - "tests/test_agent_safety_doctrine.py"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-safety-doctrine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python3 -m pip install pytest
      - name: Agent safety doctrine unit tests
        run: python3 -m pytest tests/test_agent_safety_doctrine.py -q
      - name: Agent safety doctrine manifest gate
        run: make agent-safety-doctrine-gate
