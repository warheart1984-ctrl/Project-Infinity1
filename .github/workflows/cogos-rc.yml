name: CoGOS Release Candidate

on:
  push:
    tags:
      - "v*"
      - "cogos-*"
  workflow_dispatch:
    inputs:
      cogos_tag:
        description: Override CoGOS tag (defaults to git tag on tag pushes)
        required: false
        default: ""
      base_iso_url:
        description: Debian live ISO URL for iso-tree
        required: false
        default: https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/debian-live-13.5.0-amd64-cinnamon.iso
      forge_profile:
        description: Optional Forge profile id for profile-aware builds
        required: false
        default: ""
      governance_ledger_mode:
        description: Governance ledger enforcement mode (warn or fail)
        type: choice
        options:
          - warn
          - fail
        required: false
        default: "fail"

permissions:
  contents: write
  actions: read

concurrency:
  group: cogos-rc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rc-build:
    runs-on: [self-hosted, linux, cogos-builder]
    timeout-minutes: 420
    env:
      COGOS_TAG: ${{ github.event.inputs.cogos_tag || (github.ref_type == 'tag' && github.ref_name) || format('rc-{0}', github.run_number) }}
      COGOS_FORGE_PROFILE: ${{ github.event.inputs.forge_profile || '' }}
      GOVERNANCE_LEDGER_MODE: ${{ github.event.inputs.governance_ledger_mode || 'fail' }}
      INSTALLER_STATE_DIR: /tmp/cogos-installer-state-rc
      ISO_PATH: /tmp/debian-live-amd64-cinnamon.iso
      BASE_ISO_URL: ${{ github.event.inputs.base_iso_url || 'https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/debian-live-13.5.0-amd64-cinnamon.iso' }}
      PERF_GATES_MODE: warn
      PERF_SCENARIO_PCT: "20"
      PERF_SCENARIO_SEC: "30"
      PERF_TOTAL_PCT: "15"
      PERF_QEMU_PCT: "25"
      PERF_QEMU_SEC: "20"
      PERF_RR_PCT: "30"
      PERF_RR_SEC: "15"
      PERF_HISTORY_WINDOW: "30"
      PERF_BURNIN_MIN_SAMPLES: "10"
      PERF_ZSCORE_THRESHOLD: "2.5"
      PERF_MIN_STDDEV_SEC: "1.0"
      PERF_BREACH_STREAK_THRESHOLD: "2"
      PERF_BANDS_CONFIG: .github/perf/scenario-bands.json
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
      MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Governance contract preflight
        run: |
          python3 .github/scripts/validate-governance-ledger.py --mode "$GOVERNANCE_LEDGER_MODE" --summary-only

      - name: Forge profile dry-run contract checks
        env:
          COGOS_PROFILE_PRECEDENCE_POLICY: wolf-cog-os/profiles/forge/precedence-policy.md
        run: |
          mkdir -p ci-artifacts
          ACTIVE_FORGE_PROFILE="${COGOS_FORGE_PROFILE:-forge-selfhosted}"
          bash wolf-cog-os/scripts/lib/profile-loader.sh "$ACTIVE_FORGE_PROFILE" > ci-artifacts/profile-resolution.json
          python3 wolf-cog-os/scripts/validate-profile.py --profile "$ACTIVE_FORGE_PROFILE" --mode warn --output ci-artifacts/profile-validation.json
          python3 wolf-cog-os/scripts/emit-profile-attestation.py --profile "$ACTIVE_FORGE_PROFILE" --validation ci-artifacts/profile-validation.json --resolution ci-artifacts/profile-resolution.json --output ci-artifacts/profile-attestation.json --dry-run

      - name: Normalize CI metadata
        id: meta
        run: |
          SANITIZED_TAG="$(bash .github/scripts/sanitize-tag.sh "$COGOS_TAG")"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-8)"
          echo "sanitized_tag=$SANITIZED_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=cogos-rc-${SANITIZED_TAG}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Verify required toolchain
        run: |
          command -v make
          command -v debootstrap
          command -v mksquashfs
          command -v xorriso
          command -v rsync
          command -v parted
          command -v mkfs.vfat
          command -v python3
          command -v qemu-img
          command -v qemu-system-x86_64
          command -v minisign

      - name: Download Debian live ISO
        run: |
          wget -O "$ISO_PATH" "$BASE_ISO_URL"
          ls -lh "$ISO_PATH"

      - name: Build rootfs
        run: make rootfs FORGE_PROFILE="$COGOS_FORGE_PROFILE"

      - name: Forge ISO layout smoke
        if: env.COGOS_FORGE_PROFILE != ''
        run: |
          SANITIZED_TAG="$(bash .github/scripts/sanitize-tag.sh "$COGOS_TAG")"
          ROOTFS="wolf-cog-os/build/rootfs-${SANITIZED_TAG}"
          bash wolf-cog-os/scripts/test/forge-iso-smoke.sh --rootfs "$ROOTFS"

      - name: Build tree-mode ISO
        run: |
          ISO="$ISO_PATH" make iso-tree FORGE_PROFILE="$COGOS_FORGE_PROFILE"

      - name: Emit Forge build state evidence
        if: env.COGOS_FORGE_PROFILE != ''
        run: |
          SANITIZED_TAG="$(bash .github/scripts/sanitize-tag.sh "$COGOS_TAG")"
          ROOTFS="wolf-cog-os/build/rootfs-${SANITIZED_TAG}"
          ISO="$(ls -1 wolf-cog-os/output/*.iso 2>/dev/null | head -n 1 || true)"
          python3 wolf-cog-os/scripts/emit-forge-build-state.py \
            --profile "$COGOS_FORGE_PROFILE" \
            --rootfs "$ROOTFS" \
            --iso "$ISO" \
            --emit-lineage

      - name: Run installer smoke
        run: |
          make installer-smoke INSTALLER_ARGS="--state-dir $INSTALLER_STATE_DIR"

      - name: Run installer integration tests
        run: |
          REQUIRED_FORGE_SCENARIOS="1,3,6"
          if [[ -n "${COGOS_FORGE_PROFILE}" ]]; then
            REQUIRED_FORGE_SCENARIOS="1,3,4,6"
          fi
          echo "Installer matrix scenarios: 1,2,3,4,5,6,7"
          echo "Forge required scenarios: ${REQUIRED_FORGE_SCENARIOS}"
          ISO="$ISO_PATH" \
          INSTALLER_TEST_SCENARIOS="1,2,3,4,5,6,7" \
          COGOS_MATRIX_BASE_ISO="$ISO_PATH" \
          COGOS_FORGE_PROFILE="$COGOS_FORGE_PROFILE" \
          COGOS_FORGE_REQUIRED_SCENARIOS="$REQUIRED_FORGE_SCENARIOS" \
          make installer-integration

      - name: Resolve performance history run ids
        if: always()
        id: history_runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = Number(process.env.GITHUB_RUN_ID);
            const workflowId = "cogos-rc.yml";
            const historyWindow = Number(process.env.PERF_HISTORY_WINDOW || "30");
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              status: "completed",
              per_page: 100,
            });
            const successful = runs
              .filter((run) => run.id !== currentRunId && run.conclusion === "success")
              .slice(0, historyWindow)
              .map((run) => run.id);
            core.setOutput("run_ids_json", JSON.stringify(successful));
            core.setOutput("count", String(successful.length));

      - name: Resolve previous completed run id for streak
        if: always()
        id: previous_run
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = Number(process.env.GITHUB_RUN_ID);
            const workflowId = "cogos-rc.yml";
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              status: "completed",
              per_page: 50,
            });
            const previous = runs.find((run) => run.id !== currentRunId);
            core.setOutput("run_id", previous ? String(previous.id) : "");

      - name: Download performance history artifacts
        if: always() && steps.history_runs.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          RUN_IDS_JSON: ${{ steps.history_runs.outputs.run_ids_json }}
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runIds = JSON.parse(process.env.RUN_IDS_JSON || "[]");
            fs.mkdirSync("perf-history-zips", { recursive: true });
            for (const runId of runIds) {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: Number(runId),
                per_page: 100,
              });
              const picked = artifacts.find((a) => a.name.endsWith("-rc-artifacts"));
              if (!picked) {
                core.info(`No history artifact found for run ${runId}`);
                continue;
              }
              const zip = await github.rest.actions.downloadArtifact({
                owner,
                repo,
                artifact_id: picked.id,
                archive_format: "zip",
              });
              fs.writeFileSync(`perf-history-zips/${runId}.zip`, Buffer.from(zip.data));
            }

      - name: Download previous run artifact for streak
        if: always() && steps.previous_run.outputs.run_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = Number("${{ steps.previous_run.outputs.run_id }}");
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const picked = artifacts.find((a) => a.name.endsWith("-rc-artifacts"));
            if (!picked) {
              core.info(`No previous artifact found for run ${runId}`);
              return;
            }
            const zip = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: picked.id,
              archive_format: "zip",
            });
            fs.writeFileSync("previous-run-artifact.zip", Buffer.from(zip.data));

      - name: Extract performance history artifacts
        if: always()
        run: |
          rm -rf perf-history
          mkdir -p perf-history/extracted
          if ls perf-history-zips/*.zip >/dev/null 2>&1; then
            for zip_path in perf-history-zips/*.zip; do
              run_id="$(basename "$zip_path" .zip)"
              dest="perf-history/extracted/${run_id}"
              mkdir -p "$dest"
              unzip -o "$zip_path" -d "$dest"
            done
          fi
          rm -rf previous-run-artifacts
          mkdir -p previous-run-artifacts
          if [[ -f previous-run-artifact.zip ]]; then
            unzip -o previous-run-artifact.zip -d previous-run-artifacts
          fi

      - name: Build performance history bundle
        if: always()
        env:
          RUN_IDS_JSON: ${{ steps.history_runs.outputs.run_ids_json }}
        run: |
          mkdir -p perf-history
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_ids = json.loads(os.environ.get("RUN_IDS_JSON", "[]") or "[]")
          base = Path("perf-history/extracted")
          bundle = {"runs": []}
          for rid in run_ids:
            rid_str = str(rid)
            run_dir = base / rid_str
            if not run_dir.exists():
              continue
            summary_path = run_dir / "matrix-summary.json"
            if not summary_path.exists():
              continue
            row = {"run_id": rid_str, "matrix_summary": json.loads(summary_path.read_text(encoding="utf-8"))}
            report_path = run_dir / "performance-report.json"
            if report_path.exists():
              row["performance_report"] = json.loads(report_path.read_text(encoding="utf-8"))
            bundle["runs"].append(row)
          Path("perf-history/history-bundle.json").write_text(json.dumps(bundle, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Validate history bundle integrity
        if: always()
        env:
          RUN_IDS_JSON: ${{ steps.history_runs.outputs.run_ids_json }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          requested_ids = [str(x) for x in json.loads(os.environ.get("RUN_IDS_JSON", "[]") or "[]")]
          bundle_path = Path("perf-history/history-bundle.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          errors = []

          if not bundle_path.exists():
            errors.append("history-bundle.json missing")
            bundle = {}
          else:
            try:
              bundle = json.loads(bundle_path.read_text(encoding="utf-8"))
            except Exception as exc:
              errors.append(f"history-bundle.json unreadable: {exc}")
              bundle = {}

          runs = bundle.get("runs") if isinstance(bundle, dict) else None
          if runs is None or not isinstance(runs, list):
            errors.append("history-bundle.json missing valid 'runs' list")
            runs = []

          run_entries = {}
          for idx, row in enumerate(runs):
            if not isinstance(row, dict):
              errors.append(f"runs[{idx}] is not an object")
              continue
            rid = str(row.get("run_id", "")).strip()
            if not rid:
              errors.append(f"runs[{idx}] missing run_id")
              continue
            matrix = row.get("matrix_summary")
            if not isinstance(matrix, dict):
              errors.append(f"runs[{idx}] ({rid}) missing matrix_summary object")
              continue
            scenarios = matrix.get("scenarios")
            if not isinstance(scenarios, list):
              errors.append(f"runs[{idx}] ({rid}) matrix_summary.scenarios missing list")
              continue
            run_entries[rid] = row

          extracted_base = Path("perf-history/extracted")
          extracted_ids = {p.name for p in extracted_base.iterdir() if p.is_dir()} if extracted_base.exists() else set()
          malformed_requested = [rid for rid in requested_ids if rid in extracted_ids and rid not in run_entries]
          if malformed_requested:
            errors.append("Malformed extracted history entries for requested runs: " + ",".join(sorted(malformed_requested)))

          if errors:
            with summary_path.open("a", encoding="utf-8") as fh:
              fh.write("History bundle validation failed: " + "; ".join(errors) + "\n")
            for msg in errors:
              print(msg)
            sys.exit(1)

          with summary_path.open("a", encoding="utf-8") as fh:
            fh.write(f"History bundle validation: ok (requested={len(requested_ids)}, extracted={len(extracted_ids)}, valid_runs={len(run_entries)})\n")
          print("history-bundle validation OK")
          PY

      - name: Evaluate performance gates
        if: always()
        continue-on-error: ${{ env.PERF_GATES_MODE != 'fail' }}
        run: |
          mkdir -p ci-artifacts
          CUR_SUMMARY="/tmp/cogos-installer-matrix/matrix-summary.json"
          if [[ ! -f "$CUR_SUMMARY" ]]; then
            echo '{"mode":"'"$PERF_GATES_MODE"'","baseline_available":false,"summary":{"compared_scenarios":0,"breach_count":0,"qemu_breach_count":0,"resume_rollback_breach_count":0,"should_fail":false},"notes":["Current matrix summary not found; skipped performance check."]}' > ci-artifacts/performance-report.json
            printf '# Performance Gate Report\n\n- mode: `%s`\n- baseline_available: `false`\n\n## Notes\n- Current matrix summary not found; skipped performance check.\n' "$PERF_GATES_MODE" > ci-artifacts/performance-report.md
            exit 0
          fi
          BASELINE_PATH="$(python3 - <<'PY'
          import json
          from pathlib import Path

          bundle_path = Path("perf-history/history-bundle.json")
          if not bundle_path.exists():
            print("")
          else:
            data = json.loads(bundle_path.read_text(encoding="utf-8"))
            runs = data.get("runs", [])
            if not runs:
              print("")
            else:
              run_id = str(runs[0].get("run_id", "")).strip()
              candidate = Path("perf-history/extracted") / run_id / "matrix-summary.json"
              print(str(candidate) if candidate.exists() else "")
          PY
          )"

          cmd=(python3 .github/scripts/check-performance-gates.py --current "$CUR_SUMMARY" --mode "$PERF_GATES_MODE" --report-json "ci-artifacts/performance-report.json" --report-md "ci-artifacts/performance-report.md")
          if [[ -n "$BASELINE_PATH" && -f "$BASELINE_PATH" ]]; then
            cmd+=(--baseline "$BASELINE_PATH")
          fi
          if [[ -f "perf-history/history-bundle.json" ]]; then
            cmd+=(--history-bundle "perf-history/history-bundle.json")
          fi
          if [[ -f "previous-run-artifacts/performance-report.json" ]]; then
            cmd+=(--previous-report "previous-run-artifacts/performance-report.json")
          fi
          if [[ -f "$PERF_BANDS_CONFIG" ]]; then
            cmd+=(--bands-config "$PERF_BANDS_CONFIG")
          fi
          "${cmd[@]}"

      - name: Publish performance one-line summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("ci-artifacts/performance-report.json")
          if not report_path.exists():
            line = "Performance gates: unavailable (performance-report.json not found)"
          else:
            data = json.loads(report_path.read_text(encoding="utf-8"))
            summary = data.get("summary", {})
            line = (
              "Performance gates: mode={mode}, compared={compared}, breaches={breaches}, "
              "qemu_breaches={qemu}, resume_rollback_breaches={rr}, history_runs={history}, "
              "custom_band_scenarios={custom}, enforcement_ready={ready}, streak={streak}, gate_decision={decision}, should_fail={should_fail}"
            ).format(
              mode=data.get("mode", "unknown"),
              compared=summary.get("compared_scenarios", 0),
              breaches=summary.get("breach_count", 0),
              qemu=summary.get("qemu_breach_count", 0),
              rr=summary.get("resume_rollback_breach_count", 0),
              history=data.get("history_runs_available", 0),
              custom=summary.get("custom_band_scenarios", 0),
              ready=data.get("enforcement_ready", False),
              streak=summary.get("consecutive_breach_streak", 0),
              decision=summary.get("gate_decision", "unknown"),
              should_fail=summary.get("should_fail", False),
            )
          print(line)
          with open(Path(os.environ["GITHUB_STEP_SUMMARY"]), "a", encoding="utf-8") as fh:
            fh.write(line + "\n")
          PY

      - name: Collect RC artifacts
        if: success() || failure()
        run: |
          mkdir -p ci-artifacts
          cp -f wolf-cog-os/output/*.iso ci-artifacts/ 2>/dev/null || true
          cp -f wolf-cog-os/output/*.iso.sha256 ci-artifacts/ 2>/dev/null || true
          cp -f "$INSTALLER_STATE_DIR"/install-*.log ci-artifacts/ 2>/dev/null || true
          cp -f "$INSTALLER_STATE_DIR/events.log" ci-artifacts/events.log 2>/dev/null || true
          cp -f "$INSTALLER_STATE_DIR/state.json" ci-artifacts/state.json 2>/dev/null || true
          cp -f /tmp/cogos-installer-matrix/matrix-summary.json ci-artifacts/matrix-summary.json 2>/dev/null || true
          python3 - <<'PY'
import json, os
import hashlib
from datetime import datetime, timezone
from pathlib import Path
out = Path("ci-artifacts")
out.mkdir(parents=True, exist_ok=True)
records = []
for p in sorted(out.glob("*")):
  if p.is_file():
    records.append({
      "name": p.name,
      "size_bytes": p.stat().st_size,
      "sha256": hashlib.sha256(p.read_bytes()).hexdigest(),
    })
run_meta = {
  "workflow": os.environ.get("GITHUB_WORKFLOW"),
  "run_id": os.environ.get("GITHUB_RUN_ID"),
  "run_number": os.environ.get("GITHUB_RUN_NUMBER"),
  "ref": os.environ.get("GITHUB_REF"),
  "sha": os.environ.get("GITHUB_SHA"),
  "cogos_tag": os.environ.get("COGOS_TAG"),
  "sanitized_cogos_tag": os.environ.get("SANITIZED_TAG"),
  "generated_at": datetime.now(timezone.utc).isoformat(),
}
if os.environ.get("COGOS_FORGE_PROFILE"):
  run_meta["channel"] = "forge-rc"
  run_meta["forge_profile_id"] = os.environ.get("COGOS_FORGE_PROFILE")
meta = {"run": run_meta, "artifacts": records}
(out / "rc-index.json").write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
(out / "build-metadata.json").write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
PY
          ls -la ci-artifacts || true
        env:
          SANITIZED_TAG: ${{ steps.meta.outputs.sanitized_tag }}
          COGOS_FORGE_PROFILE: ${{ env.COGOS_FORGE_PROFILE }}

      - name: Publish matrix one-line summary
        if: always()
        run: |
          python3 - <<'PY'
import json
from pathlib import Path

summary_path = Path("ci-artifacts/matrix-summary.json")
if not summary_path.exists():
  line = "Installer matrix summary: unavailable (matrix-summary.json not found)"
else:
  data = json.loads(summary_path.read_text(encoding="utf-8"))
  total = data.get("total_duration_sec", "n/a")
  failed = [s.get("name", f"id-{s.get('id')}") for s in data.get("scenarios", []) if s.get("status") == "failed"]
  if failed:
    line = f"Installer matrix summary: total_duration_sec={total}, failed_scenarios={','.join(failed)}"
  else:
    line = f"Installer matrix summary: total_duration_sec={total}, failed_scenarios=none"
print(line)
with open(Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]), "a", encoding="utf-8") as fh:
  fh.write(line + "\n")
PY

      - name: Sign RC artifacts
        if: success()
        run: |
          SIGNING_REQUIRED=1 make sign-artifacts ARTIFACT_DIR="ci-artifacts"

      - name: Verify RC signatures
        if: success()
        run: |
          make verify-artifacts ARTIFACT_DIR="ci-artifacts"

      - name: Evaluate Forge shippable gate
        if: success() && env.COGOS_FORGE_PROFILE != ''
        run: |
          python3 .github/scripts/check-forge-shippable-gate.py \
            --artifacts-dir ci-artifacts \
            --source-run-id "${{ github.run_id }}" \
            --expected-profile-id "$COGOS_FORGE_PROFILE" \
            --mode warn \
            --output ci-artifacts/forge-shippable-gate-report.json

      - name: Resolve previous tag
        id: prev
        if: success()
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate RC release notes
        if: success()
        run: |
          mkdir -p ci-artifacts
          python3 .github/scripts/generate-release-notes.py \
            --target-tag "${GITHUB_REF_NAME:-$COGOS_TAG}" \
            --previous-tag "${{ steps.prev.outputs.previous_tag }}" \
            --metadata-dir "ci-artifacts" \
            --output "ci-artifacts/release-notes.md"

      - name: Upload RC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_prefix }}-rc-artifacts
          path: ci-artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Publish prerelease metadata
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          draft: false
          generate_release_notes: false
          body_path: ci-artifacts/release-notes.md
          files: |
            ci-artifacts/*.iso
            ci-artifacts/*.iso.sha256
            ci-artifacts/*.minisig
            ci-artifacts/artifact-manifest.json
            ci-artifacts/rc-index.json
            ci-artifacts/state.json
            ci-artifacts/release-notes.md
