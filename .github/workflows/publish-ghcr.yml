name: Publish GHCR images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag (e.g. v1.26.1 or latest)
        required: true
        default: latest

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/warheart1984-ctrl/project-infinity1

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AAIS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/pilot/Dockerfile.aais
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/aais:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/aais:latest

      - name: Build and push Platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/platform/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/platform:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/platform:latest

      - name: Summary
        run: |
          echo "Published:"
          echo "  ${{ env.IMAGE_PREFIX }}/aais:${{ steps.meta.outputs.tag }}"
          echo "  ${{ env.IMAGE_PREFIX }}/platform:${{ steps.meta.outputs.tag }}"
