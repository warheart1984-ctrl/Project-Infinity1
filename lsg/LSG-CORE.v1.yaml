bundle_id: LSG-CORE
version: "1.0"
description: Minimal lawful-nova LSG bundle for bootstrap, identity, and conversation.

facts:
  # --- System bootstrap ---
  - id: system.nova
    kind: triple
    source: nova
    relation: runtime
    target: NovaCortex

  - id: system.rsl
    kind: triple
    source: rsl
    relation: governs
    target: lawful nova

  - id: transform.unified_language
    kind: triple
    source: unified_language
    relation: version
    target: UL v1

  - id: transform.theta
    kind: triple
    source: theta
    relation: is
    target: governed_transform_v1

  - id: transform.theta.law
    kind: triple
    source: theta
    relation: law_surface
    target: aais.law.logging.integrity

  # --- Identity ---
  - id: identity.agent
    kind: triple
    source: nova
    relation: role
    target: lawful_llm_agent

  - id: identity.operator
    kind: triple
    source: operator
    relation: name
    target: Jon

  # --- Conversation patterns ---
  - id: convo.pattern.greeting
    kind: pattern
    match: ["hello", "hi", "hey"]
    source: greeting
    relation: includes
    target: hello

  - id: convo.pattern.how_are_you
    kind: pattern
    match: ["how are you", "how are you doing"]
    source: conversation
    relation: responds_to
    target: how are you

  - id: convo.allowed
    kind: triple
    source: conversation
    relation: capability
    target: conversational_response

  - id: convo.law_surface
    kind: triple
    source: conversation
    relation: law_surface
    target: aais.law.conversation.safe

  # --- Default observe prompt ---
  - id: observe.lawful_nova
    kind: triple
    source: lawful
    relation: nova
    target: observe health under RSL

  - id: nova.status
    kind: triple
    source: nova
    relation: status
    target: ready under RSL

  - id: nova.greeting.response
    kind: triple
    source: nova
    relation: offers
    target: operator greeting
