schema_version: cog-os-forge-profile.v1
name: forge-selfhosted
display_name: Nova NorthStar CoG OS Forge Self-Hosted
product_name: nova-northstar-cog-os
init_mode: hybrid
systemd: user_session
boot_profile: daily-driver
payload_ul: true
packages:
  - base.txt
  - daily-driver.txt
exclude_systemd: false
services:
  - platform
  - firstboot
  - aais
  - desktop
  - ul-smoke
gates:
  - init_log_present
  - platform_heartbeat
  - cogos_manifest_valid
  - aais_health_200
  - display_manager_active
  - no_stale_firstboot_markers
  - ul_smoke_ok
