schema_version: cog-os-forge-profile.v1

name: usl-lifted-guest-aarch64

display_name: USL Lifted Guest (aarch64 placeholder)

product_name: nova-northstar-usl-lifted-guest-aarch64

init_mode: custom

systemd: none

boot_profile: metal

payload_usl_lifted: true

# Placeholder until multi-arch forge bake ships guest rootfs images.
arch: aarch64

packages:

  - base.txt

exclude_systemd: true

services:

  - platform

  - usl

gates:

  - init_log_present

  - platform_heartbeat

  - cogos_manifest_valid

  - cog_policies_present

  - governance_bundle_present

  - usl_health_200

  - usl_broker_ready

  - cog_logs_present
