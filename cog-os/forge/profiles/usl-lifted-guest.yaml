schema_version: cog-os-forge-profile.v1

name: usl-lifted-guest

display_name: USL Lifted Guest (static forge artifacts)

product_name: nova-northstar-usl-lifted-guest

init_mode: custom

systemd: none

boot_profile: metal

payload_usl_lifted: true

packages:

  - base.txt

exclude_systemd: true

services:

  - platform

  - usl

gates:

  - init_log_present

  - platform_heartbeat

  - cogos_manifest_valid

  - cog_policies_present

  - governance_bundle_present

  - usl_health_200

  - usl_broker_ready

  - cog_logs_present

