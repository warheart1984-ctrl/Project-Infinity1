# Forge substrate registry (OS-agnostic replay contract)
#
# Substrate = bootable hybrid ISO used for squashfs extract + boot replay.
# Rootfs backend (debootstrap, etc.) is separate from replay substrate.

default_substrate_id: generic-live-squashfs

substrates:
  debian-live:
    description: Debian live hybrid ISO (amd64) with live/filesystem.squashfs
    detect:
      path_globs:
        - "live/filesystem.squashfs"
        - "live/filesystem*.squashfs"
      path_any:
        - "live/vmlinuz"
        - "live/initrd.img"
    min_bytes: 300000000

  cogos-replay:
    description: CoGOS-built hybrid ISO suitable for xorriso boot replay
    extends: generic-live-squashfs
    detect:
      path_globs:
        - "live/filesystem.squashfs"
        - "live/filesystem*.squashfs"
      path_any:
        - "live/vmlinuz"
        - "boot/grub/grub.cfg"
    min_bytes: 1000000000

  generic-live-squashfs:
    description: Any hybrid live ISO with squashfs root under live/ and bootable layout
    detect:
      path_globs:
        - "live/*.squashfs"
        - "live/filesystem*.squashfs"
      path_any:
        - "live/vmlinuz"
        - "live/initrd"
        - "live/initrd.img"
    min_bytes: 100000000

  trixie-live:
    description: TrixiePup or similar live ISO with squashfs under live/
    extends: generic-live-squashfs
    detect:
      path_globs:
        - "live/*.squashfs"
      path_any:
        - "live/vmlinuz"
    min_bytes: 500000000
