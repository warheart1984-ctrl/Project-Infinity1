schema_version: forge-pipeline.v2
name: recovery
base: cogos-base
variant:
  id: recovery-rescue
  channel: stable
lineage:
  parent: minimal-core
  parent_lineage_id: ""
reproducibility:
  seed: recovery-v1
  deterministic: true
substrate:
  id: auto
kernel:
  flavor: generic
packages:
  include:
    - base
  exclude: []
overlays: []
services:
  enable: []
  disable: []
governance:
  sigil_profile: strict
  invariant_set: operator-default
runtime:
  mode: recovery
  logging: verbose
output:
  iso_name: cogos-recovery.iso
  cloud_formats:
    - raw-img
