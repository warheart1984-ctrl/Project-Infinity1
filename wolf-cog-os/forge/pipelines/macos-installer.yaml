schema_version: forge-pipeline.v2
name: macos-installer
base: darwin-base
variant:
  id: macos-installer-main
  channel: nightly
lineage:
  parent: cogos-base
  parent_lineage_id: ""
reproducibility:
  seed: macos-installer-v1
  deterministic: true
substrate:
  id: macos-installer
rootfs:
  backend: darwin-backend
kernel:
  flavor: generic
packages:
  include: []
  exclude: []
overlays:
  - overlays/macos-inject
governance:
  sigil_profile: strict
  invariant_set: darwin-sealed-volume
  required_invariants:
    - apfs_integrity
    - sealed_snapshot_verification
    - signature_preservation
runtime:
  mode: installer
  logging: normal
output:
  iso_name: forge-macos-installer.iso
  cloud_formats:
    - raw-img
