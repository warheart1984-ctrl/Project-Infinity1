# CI-safe AAIS mesh federation stack (two peers, no external rex-node repo).
version: "3.9"

services:
  aais-mesh-a:
    build:
      context: ../..
      dockerfile: deploy/mesh/Dockerfile.aais-mesh
    ports:
      - "5000:5000"
    environment:
      MESH_DATA_DIR: /data/mesh
      MESH_NODE_NAME: aais-mesh-a
      MESH_PEERS_JSON: '[{"url":"http://aais-mesh-b:5001"}]'
      PORT: "5000"
    volumes:
      - aais_mesh_a_data:/data/mesh
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/mesh/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  aais-mesh-b:
    build:
      context: ../..
      dockerfile: deploy/mesh/Dockerfile.aais-mesh
    environment:
      MESH_DATA_DIR: /data/mesh
      MESH_NODE_NAME: aais-mesh-b
      MESH_PEERS_JSON: '[{"url":"http://aais-mesh-a:5000"}]'
      PORT: "5001"
    volumes:
      - aais_mesh_b_data:/data/mesh
    depends_on:
      aais-mesh-a:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/mesh/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  aais_mesh_a_data:
  aais_mesh_b_data:
