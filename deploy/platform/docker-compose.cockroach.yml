# CockroachDB overlay for local multi-region schema development.
#
# Usage (from deploy/platform):
#   docker compose -f docker-compose.yml -f docker-compose.cockroach.yml up --build
#
# Replaces the ParadeDB `postgres` service with single-node CockroachDB on the same
# hostname/port (5432 inside the network, 5433 on the host). Tables are created by
# platform-api startup via platform/store.py Postgres _init.
#
# For production multi-region locality (GLOBAL / REGIONAL BY ROW), run
# cockroachdb/01-platform-multiregion-bootstrap.sql after:
#   ALTER DATABASE platform PRIMARY REGION "us-east1" REGIONS "us-east1", "europe-west1";

version: "3.9"

services:
  postgres:
    image: cockroachdb/cockroach:v24.3.8
    command: start-single-node --insecure --listen-addr=0.0.0.0:26257 --sql-addr=0.0.0.0:5432
    ports:
      - "5433:5432"
      - "8080:8080"
    volumes:
      - platform_crdb:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "/cockroach/cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  cockroach-init:
    image: cockroachdb/cockroach:v24.3.8
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        until /cockroach/cockroach sql --insecure --host=postgres:5432 -e "SELECT 1" >/dev/null 2>&1; do
          echo "waiting for cockroach..."
          sleep 1
        done
        /cockroach/cockroach sql --insecure --host=postgres:5432 -f /sql/00-create-database.sql
    volumes:
      - ./cockroachdb/00-create-database.sql:/sql/00-create-database.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  platform-api:
    depends_on:
      postgres:
        condition: service_healthy
      cockroach-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      PLATFORM_DATABASE_URL: postgresql://root@postgres:5432/platform?sslmode=disable

volumes:
  platform_crdb:
