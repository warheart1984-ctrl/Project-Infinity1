version: "3.9"

services:
  platform-api:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform serve --host 0.0.0.0 --port 8090
    ports:
      - "8090:8090"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - platform_runtime:/app/.runtime

  platform-worker:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform worker
    environment:
      PLATFORM_WORKER_REGION: us
    env_file:
      - .env
    depends_on:
      - platform-api
      - redis
    volumes:
      - platform_runtime:/app/.runtime

  platform-worker-us:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform worker
    environment:
      PLATFORM_WORKER_REGION: us
    env_file:
      - .env
    depends_on:
      - platform-api
      - redis
    volumes:
      - platform_runtime:/app/.runtime

  platform-worker-eu:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform worker
    environment:
      PLATFORM_WORKER_REGION: eu
    env_file:
      - .env
    depends_on:
      - platform-api
      - redis
    volumes:
      - platform_runtime:/app/.runtime

  platform-proof-worker-primary:
    profiles: ["proof-federation", "default"]
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform replay --manifest docs/proof/platform/cross_machine/REPLAY_MANIFEST.v2.template.json
    environment:
      PLATFORM_RUNNER_ID: primary
      PLATFORM_WORKER_REGION: us
    env_file:
      - .env
    volumes:
      - platform_runtime:/app/.runtime

  platform-proof-worker-secondary:
    profiles: ["proof-federation"]
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform replay --manifest docs/proof/platform/cross_machine/REPLAY_MANIFEST.v2.template.json
    environment:
      PLATFORM_RUNNER_ID: secondary
      PLATFORM_WORKER_REGION: eu
    env_file:
      - .env
    volumes:
      - platform_runtime:/app/.runtime

  platform-proof-worker-tertiary:
    profiles: ["proof-federation"]
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    environment:
      PLATFORM_RUNNER_ID: tertiary
      PLATFORM_PROOF_QUORUM: "2"
    env_file:
      - .env
    volumes:
      - platform_runtime:/app/.runtime

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - platform_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - platform_minio:/data

volumes:
  platform_pg:
  platform_minio:
  platform_runtime:
