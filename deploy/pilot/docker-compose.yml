# Infinity Pilot — Platform + AAIS full stack (early adopter)
version: "3.9"

services:
  platform-api:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform serve --host 0.0.0.0 --port 8090
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      PLATFORM_DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      PLATFORM_REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - pilot_runtime:/app/.runtime

  platform-worker:
    build:
      context: ../..
      dockerfile: deploy/platform/Dockerfile
    command: python -m platform worker
    env_file:
      - .env
    environment:
      PLATFORM_WORKER_REGION: us
      PLATFORM_DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      PLATFORM_REDIS_URL: redis://redis:6379/0
    depends_on:
      - platform-api
      - redis
    volumes:
      - pilot_runtime:/app/.runtime

  aais-api:
    build:
      context: ../..
      dockerfile: deploy/pilot/Dockerfile.aais
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      AAIS_RUNTIME_DIR: /app/.runtime/aais-data
      PLATFORM_API_BASE_URL: http://platform-api:8090
    volumes:
      - pilot_runtime:/app/.runtime
    depends_on:
      - platform-api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - pilot_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - pilot_minio:/data

volumes:
  pilot_pg:
  pilot_minio:
  pilot_runtime:
