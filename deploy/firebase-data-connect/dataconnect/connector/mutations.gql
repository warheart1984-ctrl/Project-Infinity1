# Backend-only writes — invoke via Firebase Admin SDK / service account.
# AAIS Python would call these after Memory Board controller approval.

mutation StoreMemoryChunk(
  $tenantId: String!
  $memorySlot: String!
  $sessionId: String!
  $trustClass: String!
  $source: String!
  $textBody: String!
  $embedding: Vector!
  $cisivStage: String!
) @auth(level: NO_ACCESS) {
  memoryChunk_insert(data: {
    tenantId: $tenantId
    memorySlot: $memorySlot
    sessionId: $sessionId
    trustClass: $trustClass
    source: $source
    textBody: $textBody
    embedding: $embedding
    cisivStage: $cisivStage
  }) {
    id
  }
}

mutation DeleteMemoryChunksBySlot(
  $tenantId: String!
  $memorySlot: String!
) @auth(level: NO_ACCESS) {
  memoryChunk_deleteMany(
    where: {
      tenantId: { eq: $tenantId }
      memorySlot: { eq: $memorySlot }
    }
  )
}
