# Slot-filtered ANN recall — mirrors Chroma/Scylla where-clauses on tenant + slot + session.

query RetrieveMemorySimilarity(
  $tenantId: String!
  $memorySlot: String!
  $sessionId: String!
  $queryVector: Vector!
  $limit: Int!
) @auth(level: NO_ACCESS) {
  memoryChunks_embedding_similarity(
    compare: $queryVector
    method: COSINE
    limit: $limit
    where: {
      tenantId: { eq: $tenantId }
      memorySlot: { eq: $memorySlot }
      sessionId: { eq: $sessionId }
    }
  ) {
    textBody
    trustClass
    memorySlot
    sessionId
    _metadata {
      distance
    }
  }
}

