# EXAMPLE ONLY — do NOT use with Cursor.
#
# OAuth / deny rules run on ngrok's edge before traffic reaches Nova.
# Cursor's cloud backend sends API requests without a browser login, so
# oauth or email-domain deny actions will break /v1/chat/completions.
#
# From ngrok docs (adapted). Port should be 8080 for Lawful Nova, not 80:
#   ngrok http 8080 --traffic-policy-file scripts/ngrok/policy-oauth-example.yaml

on_http_request:
  - actions:
      - type: oauth
        config:
          provider: google
  - expressions:
      - "!actions.ngrok.oauth.identity.email.endsWith('@acme.com')"
    actions:
      - type: deny
